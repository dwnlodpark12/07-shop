<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">
	<link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png">
	<link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">
	<link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png">
	<link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
	<link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
	<link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
	<link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
	<link rel="icon" type="image/png" sizes="192x192"  href="/android-icon-192x192.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="manifest" href="/manifest.json">
	<meta name="msapplication-TileColor" content="#ffffff">
	<meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
	<meta name="theme-color" content="#ffffff">
	<title>SHOP</title>
	<link rel="stylesheet" href="../css/all.min.css">
	<link rel="stylesheet" href="../css/bootstrap.min.css">
	<link rel="stylesheet" href="../css/base.css">
	<link rel="stylesheet" href="../css/index.css">
	<script src="../js/jquery-3.5.1.min.js"></script>
	<script src="../js/jquery.touchSwipe.min.js"></script>
	<script src="../js/imagesloaded.pkgd.min.js"></script>
	<script src="../js/moment.min.js"></script>
</head>
<body>
	<header class="header-wrapper">
		<div class="top-wrapper">
			<div class="wrapper">
				<div class="tel-wrap">
					<i class="fa fa-phone-square"></i>
					<span>OUR PHONE NUMBER: +77 (756) 334 876</span>
				</div>
				<div class="link-wrap">
					<a href="#" class="link"><i class="fa fa-user"></i> MY ACCOUNT</a>
					<a href="#" class="link"><i class="fa fa-shopping-basket"></i> CART</a> 
					<a href="#" class="link"><i class="fa fa-map-pin"></i> OUR LOCATION</a> 
					<a href="#" class="link"><i class="fa fa-envelope"></i> CONTACT US</a>
				</div>
			</div>
		</div>
		<div class="title-wrapper">
			<div class="wrapper">
			<div class="navi-mo-wrap">
				<div class="navi-mo-icon"><i class="fa fa-bars"></i></div>
			</div>
			<div class="logo-wrap">
				<img src="../img/logo-basel.svg" alt="logo" class="w-100">
			</div>
			<div class="navi-wrap">
				
			</div>
			<div class="cart-wrap">
				<div class="like badge-wrap">
					<i class="far fa-heart"></i>
					<div class="badge count">0</div>
				</div>
				<div class="cart">
					<i class="fa fa-shopping-cart"></i>
					<span class="cart-cnt">0</span> <span>/</span> <span class="cart-price">$0.00</span>
					</div>
				</div>
			</div>
		</div>
		<div class="search-wrapper wrapper">
			<div class="browse-wrap">
				BROWSE CATEGORIES
				<i class="fa fa-angle-down"></i>
			</div>
			<form class="search-wrap" action="#">
				<input type="text" name="search" class="input-search" placeholder="Search for products">
				<i class="fa fa-search"></i>
			</form>
		</div>
	</header>
	<nav class="mo-wrapper">
		<div class="mo-wrap">
			<form class="mo-search-wrap">
				<input type="text" name="search" class="input-search" placeholder="Search for produts">
				<i class="fa fa-search"></i>
			</form>
			<div class="mo-navi-wrap">
				<div class="mo-navi">
					HOME
					<div class="bt-down">
						<div class="slash slash-lt"></div>
						<div class="slash slash-rt"></div>
					</div>
				</div>
			</div>
		</div>
	</nav>
	<script src="../js/index.js"></script>
</body>
</html>
